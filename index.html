<!DOCTYPE html>
<html>
<head>
  <title>Ocean Haiku</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      color: white;

      /* Simple ocean gradient (no animation = safe) */
      background: linear-gradient(to bottom, #0b3d5c, #1e6f9f);
    }

    h2 {
      margin-top: 60px;
    }

    .line {
      font-size: 24px;
      margin: 20px;
      display: none;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    /* SIMPLE wave stripes (no movement = no bugs) */
    .waves {
      position: fixed;
      bottom: 0;
      width: 100%;
      height: 120px;
      background: repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.1),
        rgba(255,255,255,0.1) 10px,
        transparent 10px,
        transparent 20px
      );
    }
  </style>

</head>

<body>

<h2>Haiku: Lost at Sea</h2>

<p id="line1" class="line">Endless blue surrounds</p>
<p id="line2" class="line">Sun burns, hope drifts with the tide</p>
<p id="line3" class="line">Souls refuse to sink</p>

<button onclick="showNext()">Reveal Next Line</button>

<div class="waves"></div>

<script>
let step = 1;

function showNext() {
  if (step <= 3) {
    document.getElementById("line" + step).style.display = "block";
    step++;
  }
}
</script>

</body>
</html>
