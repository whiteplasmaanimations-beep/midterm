<!DOCTYPE html>
<html>
<head>
  <title>Simple Haiku</title>
</head>
<body>

<h2>Haiku: Lost at Sea</h2>

<p id="line1"></p>
<p id="line2"></p>
<p id="line3"></p>

<button onclick="showHaiku()">Show Haiku</button>

<script>
function showHaiku() {
  document.getElementById("line1").innerHTML = "Endless blue surrounds";
  document.getElementById("line2").innerHTML = "Sun burns, hope drifts away";
  document.getElementById("line3").innerHTML = "Souls refuse to sink";
}
</script>

</body>
</html>
