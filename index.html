<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ocean Haiku</title>
<style>
    body {
        margin: 0;
        font-family: "Georgia", serif;
        background: linear-gradient(#0a1a2f, #1e3f66);
        color: #f0f8ff;
        overflow: hidden;
        text-align: center;
    }

    /* Wave animation */
    .wave {
        position: absolute;
        width: 200%;
        height: 200px;
        bottom: 0;
        background: rgba(255,255,255,0.1);
        border-radius: 43%;
        animation: waveMove 10s infinite linear;
    }

    .wave:nth-child(2) {
        bottom: 20px;
        opacity: 0.5;
        animation-duration: 15s;
    }

    @keyframes waveMove {
        from { transform: translateX(0); }
        to { transform: translateX(-50%); }
    }

    /* Haiku styling */
    .container {
        position: relative;
        top: 30%;
        transform: translateY(-30%);
    }

    .line {
        opacity: 0;
        font-size: 2em;
        margin: 20px;
        transition: opacity 2s ease, transform 2s ease;
        transform: translateY(20px);
        cursor: pointer;
    }

    .line.visible {
        opacity: 1;
        transform: translateY(0);
    }

    /* Subtle floating animation */
    .line.visible {
        animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }

    .hint {
        position: absolute;
        bottom: 20px;
        width: 100%;
        font-size: 0.9em;
        opacity: 0.6;
    }
</style>
</head>
<body>

<div class="container">
    <div class="line" onclick="revealLine(0)">
        Endless blue surrounds
    </div>
    <div class="line" onclick="revealLine(1)">
        Sun burns, hope drifts with the tide
    </div>
    <div class="line" onclick="revealLine(2)">
        Souls refuse to sink
    </div>
</div>

<div class="wave"></div>
<div class="wave"></div>

<div class="hint">Click each line to reveal the story...</div>

<script>
    let currentLine = 0;
    const lines = document.querySelectorAll('.line');

    function revealLine(index) {
        if (index === currentLine) {
            lines[index].classList.add('visible');
            currentLine++;
        }
    }

    // Optional: ambient "wave" sound effect (muted by default)
    const audio = new Audio("https://www.soundjay.com/nature/ocean-wave-1.mp3");
    audio.loop = true;

    document.body.addEventListener("click", () => {
        audio.volume = 0.2;
        audio.play().catch(() => {});
    }, { once: true });
</script>

</body>
</html>
