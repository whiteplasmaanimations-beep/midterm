<!DOCTYPE html>
<html>
<head>
  <title>Ocean Haiku</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      color: white;
      background: linear-gradient(to bottom, #0b3d5c, #1e6f9f);
      overflow-x: hidden;
    }

    h2 {
      margin-top: 60px;
      position: relative;
      z-index: 2;
    }

    .line {
      font-size: 24px;
      margin: 20px;
      display: none;
      position: relative;
      z-index: 2; /* ALWAYS above waves */
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      position: relative;
      z-index: 2;
    }

    /* 🌊 Animated waves (safe) */
    .wave {
      position: fixed;
      bottom: 0;
      width: 200%;
      height: 120px;
      background: rgba(255,255,255,0.15);
      border-radius: 40%;
      animation: waveMove 12s linear infinite;
      z-index: 1; /* behind text */
    }

    .wave2 {
      bottom: 20px;
      opacity: 0.5;
      animation-duration: 18s;
    }

    @keyframes waveMove {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

  </style>

</head>

<body>

<h2>Haiku: Lost at Sea</h2>

<p id="line1" class="line">Endless blue surrounds</p>
<p id="line2" class="line">Sun burns, hope drifts with the tide</p>
<p id="line3" class="line">Souls refuse to sink</p>

<button onclick="showNext()">Reveal Next Line</button>

<div class="wave"></div>
<div class="wave wave2"></div>

<script>
let step = 1;

function showNext() {
  if (step <= 3) {
    document.getElementById("line" + step).style.display = "block";
    step++;
  }
}
</script>

</body>
</html>
