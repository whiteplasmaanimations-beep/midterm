<!DOCTYPE html>
<html>
<head>
  <title>Ocean Haiku</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      color: white;
      overflow-x: hidden;
      background: linear-gradient(to bottom, #87ceeb, #0b3d5c);
    }

    h2 {
      margin-top: 60px;
      position: relative;
      z-index: 3;
    }

    .line {
      font-size: 24px;
      margin: 20px;
      display: none;
      position: relative;
      z-index: 3;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      position: relative;
      z-index: 3;
    }

    .sun {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 100px;
      background: radial-gradient(circle, #ffd700, #ff8c00);
      border-radius: 50%;
      z-index: 1;
    }

    .wave {
      position: fixed;
      bottom: 0;
      width: 200%;
      height: 120px;
      background: rgba(255,255,255,0.2);
      border-radius: 40%;
      animation: waveMove 12s linear infinite;
      z-index: 2;
    }

    .wave2 {
      bottom: 20px;
      opacity: 0.5;
      animation-duration: 18s;
    }

    @keyframes waveMove {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }
  </style>
</head>

<body>

<div class="sun"></div>

<h2>Haiku: Lost at Sea</h2>

<p id="line1" class="line">Endless blue surrounds</p>
<p id="line2" class="line">Sun burns, hope drifts with the tide</p>
<p id="line3" class="line">Souls refuse to sink</p>

<!-- NEW EXTENDED LINES -->
<p id="line4" class="line">Waves whisper softly</p>
<p id="line5" class="line">Salt clings to tired hands</p>
<p id="line6" class="line">The horizon won’t answer</p>
<p id="line7" class="line">Night swallows the sky</p>
<p id="line8" class="line">Stars flicker, then fade again</p>
<p id="line9" class="line">Still, I drift forward</p>

<button id="btn" onclick="showNext()">Reveal Next Line</button>

<div class="wave"></div>
<div class="wave wave2"></div>

<script>
let step = 1;
let totalLines = 9;

function showNext() {
  if (step <= totalLines) {
    document.getElementById("line" + step).style.display = "block";
    step++;
  }

  if (step > totalLines) {
    document.getElementById("btn").innerText = "All lines revealed 🌊";
  }
}
</script>

</body>
</html>
